[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Friendly path for the Toilet Roll Sprint app (the static page lives in public/).
[[redirects]]
  from = "/sprint"
  to = "/toilet-roll-sprint.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
